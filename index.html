<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5efe0;
    --card: #faf6ea;
    --ink: #1a2d4a;
    --ink-soft: #4a5a75;
    --accent: #c9302c;
    --gold: #b8860b;
    --border: rgba(26,45,74,0.15);
    --shadow: rgba(0,0,0,0.08);
  }
  body.dark {
    --bg: #0d1628;
    --card: #152238;
    --ink: #f5efe0;
    --ink-soft: #b0bcd0;
    --accent: #e04b47;
    --gold: #d4a64a;
    --border: rgba(245,239,224,0.15);
    --shadow: rgba(0,0,0,0.4);
  }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", -apple-system, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px 12px 40px;
    transition: background 0.3s, color 0.3s;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  /* ヘッダー */
  header { text-align: center; position: relative; padding: 10px 0 18px; }
  .dark-toggle {
    position: absolute;
    top: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    color: var(--ink);
  }
  .title {
    font-size: 24px;
    letter-spacing: 2px;
    font-weight: 700;
    color: var(--gold);
  }
  .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 3px;
    margin-top: 4px;
  }
  .badge {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    background: var(--ink);
    color: var(--bg);
    padding: 4px 12px;
    border-radius: 12px;
    letter-spacing: 1px;
  }

  /* 検索とフィルタ */
  .controls {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 8px 0;
    z-index: 10;
    margin-bottom: 10px;
  }
  .search-box {
    position: relative;
    margin-bottom: 10px;
  }
  .search-input {
    width: 100%;
    padding: 12px 40px 12px 42px;
    font-size: 15px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    top: 50%; left: 15px;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    top: 50%; right: 10px;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--ink-soft);
    display: none;
    padding: 4px 10px;
  }
  .search-clear.show { display: block; }

  .fav-filter {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 0 4px;
  }
  .fav-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 7px 14px;
    font-size: 12px;
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
  }
  .fav-toggle.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .result-count {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  /* カテゴリタブ */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 4px 12px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink);
    padding: 8px 14px;
    font-size: 12px;
    border-radius: 18px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* フレーズカード */
  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 8px;
  }
  .phrase-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 16px 14px;
    box-shadow: 0 2px 8px var(--shadow);
    position: relative;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cat-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    font-weight: 600;
  }
  .fav-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 0;
    line-height: 1;
  }
  .fav-btn.faved { color: var(--accent); }

  .jp {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .en {
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .kana {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .scene {
    background: rgba(184,134,11,0.08);
    border-left: 3px solid var(--gold);
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-bottom: 12px;
    border-radius: 0 4px 4px 0;
  }
  .scene-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    margin-right: 6px;
  }
  .speak-btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    font-size: 13px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
  }
  .speak-btn:active { transform: scale(0.97); }
  .speak-btn.speaking { background: var(--accent); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.8;
  }

  /* フッター */
  footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .motto {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .from {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  @media (max-width: 480px) {
    .title { font-size: 20px; }
    .jp { font-size: 16px; }
    .en { font-size: 17px; }
  }
</style>
</head>

</div>

  { c:'trouble', jp:'お手洗いはあちらでございます', en:'The restroom is over there.', kana:'ザ レストルーム イズ オーヴァー ゼア', s:'方向を手で示しながら。' },
  { c:'trouble', jp:'ご来店ありがとうございました', en:'Thank you so much for dining with us.', kana:'サンキュー ソー マッチ フォー ダイニング ウィズ アス', s:'お見送り時、心を込めて。' },
  { c:'trouble', jp:'またのお越しをお待ちしております', en:'We look forward to welcoming you again.', kana:'ウィ ルック フォーワード トゥ ウェルカミング ユー アゲイン', s:'別れ際の決め台詞。リピート促進にも。' }
];

// State
let state = {
  category: 'all',
  search: '',
  favOnly: false,
  favs: JSON.parse(localStorage.getItem('akira_favs') || '[]')
};

// DOM shortcuts
const $ = id => document.getElementById(id);

// Render tabs
function renderTabs() {
  const tabs = $('tabs');
  tabs.innerHTML = CATEGORIES.map(cat =>
    `<button class="tab ${state.category === cat.id ? 'active' : ''}" data-cat="${cat.id}">${cat.label}</button>`
  ).join('');
  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      state.category = btn.dataset.cat;
      renderTabs();
      renderList();
    });
  });
}

// Render phrase list
function renderList() {
  const list = $('phraseList');
  const counter = $('resultCount');
  const q = state.search.toLowerCase().trim();
  
  let filtered = PHRASES.filter((p, i) => {
    if (state.favOnly && !state.favs.includes(i)) return false;
    if (state.category !== 'all' && p.c !== state.category) return false;
    if (q) {
      const hay = (p.jp + ' ' + p.en + ' ' + p.kana).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).map(p => ({ ...p, idx: PHRASES.indexOf(p) }));

  counter.textContent = filtered.length + ' 件';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">🍃<br><br>該当するフレーズはありません。<br>検索語を変えてみてくださいね。</div>';
    return;
  }

  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c.label]));

  list.innerHTML = filtered.map(p => `
    <div class="phrase-card" data-idx="${p.idx}">
      <div class="card-head">
        <span class="cat-label">${catMap[p.c] || ''}</span>
        <button class="fav-btn ${state.favs.includes(p.idx) ? 'faved' : ''}" data-fav="${p.idx}">${state.favs.includes(p.idx) ? '★' : '☆'}</button>
      </div>
      <div class="jp">${p.jp}</div>
      <div class="en">${p.en}</div>
      <div class="kana">${p.kana}</div>
      <div class="scene"><span class="scene-label">💡 使用シーン</span>${p.s}</div>
      <button class="speak-btn" data-speak="${encodeURIComponent(p.en)}">🔊 発音を聞く</button>
    </div>
  `).join('');

  // Event listeners
  list.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.fav);
      toggleFav(idx);
    });
  });
  list.querySelectorAll('.speak-btn').forEach(btn => {
    btn.addEventListener('click', () => speak(decodeURIComponent(btn.dataset.speak), btn));
  });
}

// Toggle favourite
function toggleFav(idx) {
  if (state.favs.includes(idx)) {
    state.favs = state.favs.filter(i => i !== idx);
  } else {
    state.favs.push(idx);
  }
  localStorage.setItem('akira_favs', JSON.stringify(state.favs));
  renderList();
}

// Speak via SpeechSynthesis
function speak(text, btn) {
  if (!('speechSynthesis' in window)) {
    alert('お使いのブラウザでは音声再生に対応していません。');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-GB';
  utter.rate = 0.9;
  utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const gb = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
  if (gb) utter.voice = gb;
  if (btn) {
    btn.classList.add('speaking');
    utter.onend = () => btn.classList.remove('speaking');
    utter.onerror = () => btn.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utter);
}

// Dark mode
function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('akira_dark', isDark ? '1' : '0');
  $('darkToggle').textContent = isDark ? '☀️' : '🌙';
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('akira_dark') === '1') {
    document.body.classList.add('dark');
    $('darkToggle').textContent = '☀️';
  }
  $('darkToggle').addEventListener('click', toggleDark);

  $('searchInput').addEventListener('input', (e) => {
    state.search = e.target.value;
    $('searchClear').classList.toggle('show', !!state.search);
    renderList();
  });
  $('searchClear').addEventListener('click', () => {
    state.search = '';
    $('searchInput').value = '';
    $('searchClear').classList.remove('show');
    renderList();
  });
  $('favToggle').addEventListener('click', () => {
    state.favOnly = !state.favOnly;
    $('favToggle').classList.toggle('active', state.favOnly);
    renderList();
  });

  // Voices may load async on some browsers
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  renderTabs();
  renderList();
});
</script>
</body>
</html>
